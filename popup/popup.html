<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wordstat Parser</title>
  <style>
    /* Базовые стили для popup */
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 16px 0;
      text-align: center;
      color: #fc3f1d;
    }

    .btn {
      width: 100%;
      padding: 12px 16px;
      background-color: #fc3f1d;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn:hover {
      background-color: #e0381a;
    }

    .btn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    .status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      text-align: center;
    }

    .status.success {
      background-color: #d4edda;
      color: #155724;
    }

    .status.error {
      background-color: #f8d7da;
      color: #721c24;
    }

    .status.info {
      background-color: #d1ecf1;
      color: #0c5460;
    }

    .stats {
      margin-top: 12px;
      padding: 8px;
      background-color: #f8f9fa;
      border-radius: 4px;
      font-size: 12px;
    }

    .stats div {
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <h1>Wordstat Parser</h1>
  
  <button id="collectBtn" class="btn">Собрать и Скачать CSV</button>
  
  <div id="status" class="status" style="display: none;"></div>
  
  <div id="stats" class="stats" style="display: none;">
    <div>Найдено фраз: <strong id="countPhrases">0</strong></div>
    <div>Общая частотность: <strong id="totalFrequency">0</strong></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
